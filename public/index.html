<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navmesh Assignment</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0f1015;
        font-family: "Segoe UI", sans-serif;
        color: #d8dfef;
      }

      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(6, 7, 11, 0.75);
        border: 1px solid rgba(208, 218, 242, 0.16);
        backdrop-filter: blur(6px);
        line-height: 1.4;
        font-size: 13px;
      }

      #hud b {
        color: #87f0b5;
      }
    </style>
  </head>
  <body>
    <div id="hud">
      <div><b>WASD</b> move player</div>
      <div>Green sphere: you</div>
      <div>Red sphere: enemy AI</div>
      <div>Cyan line: enemy path</div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
